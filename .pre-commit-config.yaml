---
repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: "v22.1.5"
    hooks:
      - id: clang-format
  - repo: https://github.com/neocmakelsp/neocmakelsp
    rev: "v0.10.2"
    hooks:
      - id: "neocmakelsp-format"
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
